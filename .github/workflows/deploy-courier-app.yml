name: Deploy Courier App to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'apps/courier-app/**'
      - '.github/workflows/deploy-courier-app.yml'
      - 'deploy/nginx/wms.conf'
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Build courier-app on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            npm install --no-audit --no-fund
            npm --workspace apps/courier-app run build -- --base=/courier/
            echo "=== BUILD OK ==="
            ls -la apps/courier-app/dist/assets | head -n 20

      - name: Sync nginx + reload
        if: always()
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: false
          script: |
            cd "${{ secrets.VPS_PATH }}" || exit 0
            for TARGET in /etc/nginx/sites-available/wms.conf /etc/nginx/conf.d/wms.conf; do
              if [ -f "$TARGET" ]; then
                cp -f deploy/nginx/wms.conf "$TARGET" 2>&1 \
                  || sudo -n cp -f deploy/nginx/wms.conf "$TARGET" 2>&1 \
                  || echo "[fail] cp $TARGET"
                break
              fi
            done
            (nginx -t 2>&1)         || (sudo -n nginx -t 2>&1)         || true
            (nginx -s reload 2>&1)  || (sudo -n nginx -s reload 2>&1)  \
              || (systemctl reload nginx 2>&1)  || (sudo -n systemctl reload nginx 2>&1)  \
              || (systemctl restart nginx 2>&1) || (sudo -n systemctl restart nginx 2>&1) \
              || echo "[fail] reload"
            exit 0

      - name: Assert /courier/ is serving
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -uo pipefail
            cd "${{ secrets.VPS_PATH }}"
            BASE="http://127.0.0.1"
            FAIL=0
            JS=$(grep -oE '/courier/assets/[^"]+\.js'  apps/courier-app/dist/index.html | head -n 1 || echo "")
            CSS=$(grep -oE '/courier/assets/[^"]+\.css' apps/courier-app/dist/index.html | head -n 1 || echo "")
            echo "JS=${JS:-(none)}  CSS=${CSS:-(none)}"

            check () {
              local L="$1" U="$2" S="$3" T="$4"
              echo "─ ${L} → ${U} ─"
              local RESP CT
              RESP=$(curl -sS -o /dev/null -D /tmp/h.$$ -w "%{http_code}" "${U}" 2>&1) || true
              CT=$(grep -i '^content-type:' /tmp/h.$$ | head -n 1 | tr -d '\r')
              rm -f /tmp/h.$$
              echo "  status=${RESP}  ${CT}"
              [ "$RESP" = "$S" ] && echo "$CT" | grep -qi "$T" \
                && { echo "  [PASS]"; return 0; } \
                || { echo "  [FAIL] want ${S}+${T}"; return 1; }
            }

            check "/courier/" "${BASE}/courier/" "200" "text/html" || FAIL=1
            [ -n "$JS" ]  && { check "JS"  "${BASE}${JS}"  "200" "javascript" || FAIL=1; } || FAIL=1
            [ -n "$CSS" ] && { check "CSS" "${BASE}${CSS}" "200" "text/css"   || FAIL=1; } || FAIL=1

            if [ "$FAIL" -ne 0 ]; then
              echo "::error::Courier App is NOT serving correctly"
              exit 1
            fi
            echo "=== COURIER APP DEPLOY DONE ==="
