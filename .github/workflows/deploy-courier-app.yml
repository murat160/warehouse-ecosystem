name: Deploy Courier App to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'apps/courier-app/**'
      - '.github/workflows/deploy-courier-app.yml'
      - 'deploy/nginx/wms.conf'
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Build courier-app on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 120s
          command_timeout: 15m
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            npm install --no-audit --no-fund
            npm --workspace apps/courier-app run build -- --base=/courier/
            echo "=== BUILD OK ==="
            ls -la apps/courier-app/dist/assets | head -n 20

      - name: Sync nginx + reload
        if: always()
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 120s
          command_timeout: 15m
          script_stop: false
          script: |
            cd "${{ secrets.VPS_PATH }}" || exit 0

            echo "::group::Find nginx config files"
            for p in \
              /etc/nginx/sites-enabled/wms \
              /etc/nginx/sites-enabled/wms.conf \
              /etc/nginx/sites-available/wms \
              /etc/nginx/sites-available/wms.conf \
              /etc/nginx/conf.d/wms.conf
            do [ -e "$p" ] && echo "[found] $p"; done
            echo "::endgroup::"

            echo "::group::Sync nginx config from repo"
            SYNCED=""
            for TARGET in \
              /etc/nginx/sites-available/wms \
              /etc/nginx/sites-available/wms.conf \
              /etc/nginx/conf.d/wms.conf
            do
              if [ -f "$TARGET" ]; then
                if cp -f deploy/nginx/wms.conf "$TARGET" 2>&1; then
                  echo "[ok] cp → $TARGET"; SYNCED="$TARGET"; break
                elif sudo -n cp -f deploy/nginx/wms.conf "$TARGET" 2>&1; then
                  echo "[ok] sudo cp → $TARGET"; SYNCED="$TARGET"; break
                else
                  echo "[fail] cannot write $TARGET"
                fi
              fi
            done
            [ -z "$SYNCED" ] && echo "[fail] nginx config NOT synced — running config still active"
            echo "::endgroup::"

            echo "::group::nginx -t"
            (nginx -t 2>&1) || (sudo -n nginx -t 2>&1) || true
            echo "::endgroup::"

            echo "::group::nginx reload"
            (nginx -s reload 2>&1) \
              || (sudo -n nginx -s reload 2>&1) \
              || (systemctl reload nginx 2>&1) \
              || (sudo -n systemctl reload nginx 2>&1) \
              || (systemctl restart nginx 2>&1) \
              || (sudo -n systemctl restart nginx 2>&1) \
              || echo "[fail] reload"
            echo "::endgroup::"
            exit 0

      - name: Assert /courier/ is serving
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 120s
          command_timeout: 15m
          script_stop: true
          script: |
            set -uo pipefail
            cd "${{ secrets.VPS_PATH }}"
            BASE="http://127.0.0.1"
            FAIL=0

            echo "::group::Active nginx config (relevant /courier/ blocks)"
            (nginx -T 2>/dev/null || sudo -n nginx -T 2>/dev/null || true) \
              | awk '/location[^;]*\/courier/{p=1} p{print; if(/^\}/){p=0}}' \
              | head -n 80 || true
            echo "::endgroup::"

            echo "::group::dist/index.html"
            cat apps/courier-app/dist/index.html || true
            echo "::endgroup::"

            JS=$(grep -oE '/courier/assets/[^"]+\.js'  apps/courier-app/dist/index.html | head -n 1 || echo "")
            CSS=$(grep -oE '/courier/assets/[^"]+\.css' apps/courier-app/dist/index.html | head -n 1 || echo "")
            echo "JS=${JS:-(none)}  CSS=${CSS:-(none)}"

            check () {
              local L="$1" U="$2" S="$3" T="$4"
              echo "─ ${L} → ${U} ─"
              local RESP CT
              RESP=$(curl -sS -o /tmp/body.$$ -D /tmp/h.$$ -w "%{http_code}" "${U}" 2>&1) || true
              CT=$(grep -i '^content-type:' /tmp/h.$$ | head -n 1 | tr -d '\r')
              echo "  status=${RESP}  ${CT}"
              echo "  body(first lines):"
              head -n 5 /tmp/body.$$ 2>/dev/null | sed 's/^/    /'
              rm -f /tmp/h.$$ /tmp/body.$$
              [ "$RESP" = "$S" ] && echo "$CT" | grep -qi "$T" \
                && { echo "  [PASS]"; return 0; } \
                || { echo "  [FAIL] want ${S}+${T}"; return 1; }
            }

            check "/courier/" "${BASE}/courier/" "200" "text/html" || FAIL=1
            [ -n "$JS" ]  && { check "JS"  "${BASE}${JS}"  "200" "javascript" || FAIL=1; } || FAIL=1
            [ -n "$CSS" ] && { check "CSS" "${BASE}${CSS}" "200" "text/css"   || FAIL=1; } || FAIL=1

            echo "::group::Same checks via public IP"
            PUB="http://46.202.189.230"
            curl -sS -I -o /dev/null -w "  /courier/  %{http_code}\n" "${PUB}/courier/" || true
            [ -n "$JS"  ] && curl -sS -I -o /dev/null -w "  JS         %{http_code}\n" "${PUB}${JS}"  || true
            [ -n "$CSS" ] && curl -sS -I -o /dev/null -w "  CSS        %{http_code}\n" "${PUB}${CSS}" || true
            echo "::endgroup::"

            if [ "$FAIL" -ne 0 ]; then
              echo "::error::Courier App is NOT serving correctly"
              exit 1
            fi
            echo "=== COURIER APP DEPLOY DONE ==="
