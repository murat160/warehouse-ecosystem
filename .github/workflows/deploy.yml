# ============================================================
#  Manual "deploy everything" workflow.
#
#  Per-app workflows handle normal pushes:
#    - deploy-admin-panel.yml      → apps/admin-panel/**
#    - deploy-warehouse-app.yml    → apps/warehouse-app/**
#    - deploy-courier-app.yml      → apps/courier-app/**
#    - deploy-pickup-point-app.yml → apps/pickup-point-app/**
#    - deploy-seller-app.yml       → apps/seller-app/**
#    - deploy-customer-app.yml     → apps/customer-app/**
#
#  Until 2026-04-30 this workflow ran on every push to main, which
#  meant every commit (even a typo fix in one app) re-built and
#  redeployed ALL frontends — racing the per-app workflows in the
#  same `vps-deploy` concurrency group and producing flaky, opaque
#  failures (e.g. courier commit failing the admin deploy).
#
#  It is now manual-only — useful for "rebuild everything from
#  scratch" after a server move or first-run.
#
#  Required secrets:
#    VPS_HOST · VPS_USER · VPS_SSH_KEY · VPS_APP_DIR
# ============================================================

name: Deploy ALL apps to VPS (manual)

on:
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger remote deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}
            ./deploy/deploy.sh
