name: Deploy Admin Panel to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            cd "${{ secrets.VPS_PATH }}"

            git fetch origin main
            git reset --hard origin/main

            npm install --no-audit --no-fund

            npm --workspace apps/admin-panel run build -- --base=/admin/

            # ── Sync nginx config from repo onto the running VPS ──────────
            #
            # The original workflow ran `nginx -t && systemctl restart nginx`
            # without sudo, so the SSH user is already root (or has full
            # NOPASSWD). We keep the same convention here — no `sudo`.
            #
            # If the user is NOT root, this `cp` simply fails and we fall
            # back to the existing nginx config (the `|| true` keeps the
            # deploy alive). The `nginx -t` step right after will still
            # validate whatever is currently installed.
            #
            # Tries Debian/Ubuntu layout first, then RHEL-style.
            if [ -w /etc/nginx/sites-available/wms.conf ] 2>/dev/null \
               || [ -f /etc/nginx/sites-available/wms.conf ]; then
              cp -f deploy/nginx/wms.conf /etc/nginx/sites-available/wms.conf 2>/dev/null \
                && echo "[nginx] synced → /etc/nginx/sites-available/wms.conf" \
                || echo "[nginx] WARN: could not write /etc/nginx/sites-available/wms.conf"
            elif [ -f /etc/nginx/conf.d/wms.conf ]; then
              cp -f deploy/nginx/wms.conf /etc/nginx/conf.d/wms.conf 2>/dev/null \
                && echo "[nginx] synced → /etc/nginx/conf.d/wms.conf" \
                || echo "[nginx] WARN: could not write /etc/nginx/conf.d/wms.conf"
            else
              echo "[nginx] no managed wms.conf at /etc/nginx/sites-available/ or /etc/nginx/conf.d/"
              echo "[nginx] sites-available/:"; ls -la /etc/nginx/sites-available/ 2>/dev/null || true
              echo "[nginx] conf.d/:";          ls -la /etc/nginx/conf.d/          2>/dev/null || true
            fi

            nginx -t
            systemctl reload nginx

            echo "=== ADMIN PANEL DEPLOY DONE ==="

            # ── Self-test (never fails the deploy) ────────────────────────
            # Wraps the whole block in a subshell so `set -e` from the outer
            # script can't kill us; pipefail-friendly: each step is guarded.
            (
              set +e
              echo "--- self-test ---"
              curl -sS -I "http://127.0.0.1/admin/" | head -n 1 || true

              # Find the JS chunk hash from the freshly-built index.html.
              JS_PATH=""
              if [ -f apps/admin-panel/dist/index.html ]; then
                JS_PATH=$(grep -oE '/admin/assets/[^"]+\.js' apps/admin-panel/dist/index.html | head -n 1 || true)
              fi
              if [ -n "$JS_PATH" ]; then
                echo "[self-test] HEAD ${JS_PATH}"
                curl -sS -I "http://127.0.0.1${JS_PATH}" | head -n 2 || true
              else
                echo "[self-test] could not extract JS chunk path from dist/index.html"
              fi
            ) || true
