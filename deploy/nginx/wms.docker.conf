# Nginx config used inside the docker `web` image.
# api service is reachable as DNS name `api` (compose networking).

upstream wms_api {
    server api:4000;
}

server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://wms_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /admin/        { alias /usr/share/nginx/html/admin/;        try_files $uri $uri/ /admin/index.html; }
    location /staff/        { alias /usr/share/nginx/html/staff/;        try_files $uri $uri/ /staff/index.html; }
    location /supervisor/   { alias /usr/share/nginx/html/supervisor/;   try_files $uri $uri/ /supervisor/index.html; }
    location /seller/       { alias /usr/share/nginx/html/seller/;       try_files $uri $uri/ /seller/index.html; }
    location /courier/      { alias /usr/share/nginx/html/courier/;      try_files $uri $uri/ /courier/index.html; }
    location /customer/     { alias /usr/share/nginx/html/customer/;     try_files $uri $uri/ /customer/index.html; }
    location /pickup/       { alias /usr/share/nginx/html/pickup/;       try_files $uri $uri/ /pickup/index.html; }

    location = / { return 302 /admin/; }
}
