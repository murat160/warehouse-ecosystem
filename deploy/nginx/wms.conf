# ============================================================
#  Nginx config — WMS Ecosystem on Hostinger VPS
#  Single domain/IP, all 5 frontend apps + API on subpaths.
#
#  Path layout:
#    /            → Admin Panel (default landing)
#    /staff/      → Staff App
#    /admin/      → Admin Panel
#    /supervisor/ → Supervisor Panel
#    /seller/     → Seller Portal
#    /courier/    → Courier Dispatch
#    /api/        → Backend API (Fastify on 127.0.0.1:4000)
#
#  Replace IP_OR_DOMAIN before activating.
# ============================================================

upstream wms_api {
    server 127.0.0.1:4000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name IP_OR_DOMAIN;

    client_max_body_size 25m;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ---- API ----
    location /api/ {
        proxy_pass http://wms_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Frontend apps ----
    # Each app is a Vite SPA; nginx serves dist/ with HTML5 history fallback.

    location /staff/ {
        alias /var/www/wms/apps/staff-app/dist/;
        try_files $uri $uri/ /staff/index.html;
    }

    location /admin/ {
        alias /var/www/wms/apps/admin-panel/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    location /supervisor/ {
        alias /var/www/wms/apps/supervisor-panel/dist/;
        try_files $uri $uri/ /supervisor/index.html;
    }

    location /seller/ {
        alias /var/www/wms/apps/seller-portal/dist/;
        try_files $uri $uri/ /seller/index.html;
    }

    location /courier/ {
        alias /var/www/wms/apps/courier-dispatch/dist/;
        try_files $uri $uri/ /courier/index.html;
    }

    # ---- Default landing → admin ----
    location = / {
        return 302 /admin/;
    }

    # ---- Static asset cache ----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
