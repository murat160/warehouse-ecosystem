# ============================================================
#  Nginx config — Warehouse + Marketplace Ecosystem on Hostinger VPS
#
#  Single VPS / single IP. All frontends + API on subpaths.
#  See docs/DEPLOY_MAP.md for the canonical app ↔ URL ↔ subdomain
#  table; this file MUST stay in sync with that document.
#
#  Path layout (canonical, 2026-04-30):
#    /             → Customer App        (apps/customer-app)
#    /admin/       → Admin Panel         (apps/admin-panel)
#    /warehouse/   → Warehouse App       (apps/warehouse-app)
#    /courier/     → Express Courier     (apps/courier-app)
#    /pvz/         → Pickup Point / PVZ  (apps/pickup-point-app)
#    /partner/     → Seller / Partner    (apps/seller-app)
#    /api/         → Backend API         (Fastify on 127.0.0.1:4000)
#
#  Reserved (no app yet, do NOT route until folder exists):
#    /warehouse-courier/ → apps/warehouse-courier-app
#
#  Legacy (still present in the repo, left as-is):
#    /staff/       → apps/staff-app
#    /supervisor/  → apps/supervisor-panel
#
#  Two rules to remember when adding a new app:
#
#    1. The `^~ /<path>/assets/` block MUST sit ABOVE the regex
#       `~* \.(js|css)$` cache rule at the bottom. Otherwise the
#       regex wins and strips the alias → JS/CSS return 404 / wrong
#       MIME → blank page.
#
#    2. SPA fallback uses `try_files $uri $uri/ /<path>/index.html;`
#       inside the `/<path>/` location. For the Customer App on root
#       it's `/index.html`.
#
#  Replace IP_OR_DOMAIN before activating in production.
# ============================================================

upstream wms_api {
    server 127.0.0.1:4000;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name IP_OR_DOMAIN _;

    client_max_body_size 25m;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ─── API ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://wms_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ─── Admin Panel · /admin/ ─────────────────────────────────────────
    location ^~ /admin/assets/ {
        alias /var/www/wms/apps/admin-panel/dist/assets/;
        try_files $uri =404;
        expires 1y; access_log off;
        add_header Cache-Control "public, immutable";
    }
    location /admin/ {
        alias /var/www/wms/apps/admin-panel/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    # ─── Warehouse App · /warehouse/ ───────────────────────────────────
    location ^~ /warehouse/assets/ {
        alias /var/www/wms/apps/warehouse-app/dist/assets/;
        try_files $uri =404;
        expires 1y; access_log off;
        add_header Cache-Control "public, immutable";
    }
    location /warehouse/ {
        alias /var/www/wms/apps/warehouse-app/dist/;
        try_files $uri $uri/ /warehouse/index.html;
    }

    # ─── Express Courier · /courier/ ───────────────────────────────────
    location ^~ /courier/assets/ {
        alias /var/www/wms/apps/courier-app/dist/assets/;
        try_files $uri =404;
        expires 1y; access_log off;
        add_header Cache-Control "public, immutable";
    }
    location /courier/ {
        alias /var/www/wms/apps/courier-app/dist/;
        try_files $uri $uri/ /courier/index.html;
    }

    # ─── Pickup Point (PVZ) · /pvz/ ────────────────────────────────────
    location ^~ /pvz/assets/ {
        alias /var/www/wms/apps/pickup-point-app/dist/assets/;
        try_files $uri =404;
        expires 1y; access_log off;
        add_header Cache-Control "public, immutable";
    }
    location /pvz/ {
        alias /var/www/wms/apps/pickup-point-app/dist/;
        try_files $uri $uri/ /pvz/index.html;
    }

    # ─── Seller / Partner · /partner/ ──────────────────────────────────
    location ^~ /partner/assets/ {
        alias /var/www/wms/apps/seller-app/dist/assets/;
        try_files $uri =404;
        expires 1y; access_log off;
        add_header Cache-Control "public, immutable";
    }
    location /partner/ {
        alias /var/www/wms/apps/seller-app/dist/;
        try_files $uri $uri/ /partner/index.html;
    }

    # ─── Reserved: Warehouse Courier · /warehouse-courier/ ─────────────
    # Add when apps/warehouse-courier-app/dist exists. Pattern:
    #   location ^~ /warehouse-courier/assets/ { alias .../assets/; try_files $uri =404; }
    #   location /warehouse-courier/         { alias .../;       try_files $uri $uri/ /warehouse-courier/index.html; }

    # ─── Legacy (kept; not part of the canonical 7-app map) ────────────
    location ^~ /staff/assets/ {
        alias /var/www/wms/apps/staff-app/dist/assets/;
        try_files $uri =404;
        expires 1y; access_log off;
    }
    location /staff/ {
        alias /var/www/wms/apps/staff-app/dist/;
        try_files $uri $uri/ /staff/index.html;
    }
    location ^~ /supervisor/assets/ {
        alias /var/www/wms/apps/supervisor-panel/dist/assets/;
        try_files $uri =404;
        expires 1y; access_log off;
    }
    location /supervisor/ {
        alias /var/www/wms/apps/supervisor-panel/dist/;
        try_files $uri $uri/ /supervisor/index.html;
    }

    # ─── Customer App · / (root) ───────────────────────────────────────
    # Customer goes LAST because it's at the root: any path that didn't
    # match a more specific prefix above falls into the customer SPA.
    # Customer assets live at /assets/ (Vite build with --base=/), so
    # the assets block matches an absolute /assets/ URI.
    location ^~ /assets/ {
        alias /var/www/wms/apps/customer-app/dist/assets/;
        try_files $uri =404;
        expires 1y; access_log off;
        add_header Cache-Control "public, immutable";
    }
    location / {
        root /var/www/wms/apps/customer-app/dist;
        try_files $uri $uri/ /index.html;
    }

    # NOTE: the old `~* \.(js|css|png|...)$` regex location was removed
    # in 2026-04-30. It used to win over `/admin/`, `/courier/`, etc.,
    # and made nginx return 404 / text/html for app JS chunks (the
    # white-screen bug). Per-app `^~ /<path>/assets/` blocks above now
    # set `expires 1y` themselves, so we don't need the regex anymore.
}
