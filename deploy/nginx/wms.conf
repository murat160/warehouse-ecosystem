# ============================================================
#  Nginx config — Warehouse + Marketplace Ecosystem on Hostinger VPS
#  Single VPS / single IP. All 7 frontends + API on subpaths.
#
#  Path layout:
#    /             → redirects to /admin/
#    /api/         → Backend API (Fastify on 127.0.0.1:4000)
#    /admin/       → Admin Panel
#    /staff/       → Warehouse Staff App
#    /supervisor/  → Supervisor Panel
#    /seller/      → Seller / Merchant App
#    /courier/     → Courier App
#    /customer/    → Customer App
#    /pickup/      → Pickup Point App
#    /warehouse/   → Warehouse App (рабочее приложение склада)
#
#  Future: each path can be moved to its own subdomain
#  (admin.domain.com, customer.domain.com, ...) without changing
#  any application code — only this nginx file.
#
#  Replace IP_OR_DOMAIN before activating.
# ============================================================

upstream wms_api {
    server 127.0.0.1:4000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name IP_OR_DOMAIN;

    client_max_body_size 25m;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ---- API ----
    location /api/ {
        proxy_pass http://wms_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Frontend apps (Vite SPAs, HTML5 history fallback) ----

    location /admin/ {
        alias /var/www/wms/apps/admin-panel/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    location /staff/ {
        alias /var/www/wms/apps/staff-app/dist/;
        try_files $uri $uri/ /staff/index.html;
    }

    location /supervisor/ {
        alias /var/www/wms/apps/supervisor-panel/dist/;
        try_files $uri $uri/ /supervisor/index.html;
    }

    location /seller/ {
        alias /var/www/wms/apps/seller-app/dist/;
        try_files $uri $uri/ /seller/index.html;
    }

    location /courier/ {
        alias /var/www/wms/apps/courier-app/dist/;
        try_files $uri $uri/ /courier/index.html;
    }

    location /customer/ {
        alias /var/www/wms/apps/customer-app/dist/;
        try_files $uri $uri/ /customer/index.html;
    }

    location /pickup/ {
        alias /var/www/wms/apps/pickup-point-app/dist/;
        try_files $uri $uri/ /pickup/index.html;
    }

    # Assets отдельным блоком с `^~`, чтобы перебить regex
    # `~* \.(js|css|png|...)$` ниже — иначе он ловит .js/.css
    # и возвращает 404 (alias не применяется).
    location ^~ /warehouse/assets/ {
        alias /var/www/wms/apps/warehouse-app/dist/assets/;
        try_files $uri =404;
    }

    location /warehouse/ {
        alias /var/www/wms/apps/warehouse-app/dist/;
        try_files $uri $uri/ /warehouse/index.html;
    }

    # ---- Default landing → admin ----
    location = / {
        return 302 /admin/;
    }

    # ---- Static asset cache ----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
