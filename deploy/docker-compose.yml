# ============================================================
#  Docker Compose for local dev OR all-in-one VPS deploy.
#  Optional alternative to deploy.sh for users who prefer Docker.
#
#  Usage:
#    docker compose -f deploy/docker-compose.yml up --build
#
#  Hostinger VPS — install Docker first:
#    curl -fsSL https://get.docker.com | sh
# ============================================================

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      NODE_ENV: production
      API_PORT: 4000
      API_HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-please_change_me_to_something_long_and_random}
      DATABASE_URL: ${DATABASE_URL:-file:/data/wms.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - wms_data:/data
    ports:
      - "4000:4000"
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    depends_on:
      - api
    ports:
      - "80:80"
    restart: unless-stopped

  # Optional Postgres (set DATABASE_URL accordingly to enable):
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: wms
  #     POSTGRES_PASSWORD: wms_password
  #     POSTGRES_DB: wms
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped

volumes:
  wms_data:
  # pg_data:
